<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda - Main</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header
      id="header"
      class="bg-dark py-3 mb-4 border-bottom border-secondary"
    >
      <div class="container d-flex justify-content-between align-items-center">
        <h1 id="titulo" class="h4 mb-0">Tienda General</h1>
        <nav id="nav" class="navbar">
          <ul id="menu" class="nav nav-pills">
            <li class="nav-item">
              <a class="nav-link text-light" href="#catalogo">Catálogo</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="#carrito">Carrito</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="#historial">Historial</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="#admin">Administración</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="container mt-4">
      <section id="login" aria-label="Inicio de sesión" class="mb-5">
        <h2 class="h5 mb-3">Inicio de sesión / Registro</h2>
        <form id="form-login" class="row g-3">
          <div class="col-md-6">
            <label for="usuario" class="form-label">Usuario</label>
            <input
              id="usuario"
              name="usuario"
              type="text"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-md-6">
            <label for="contrasena" class="form-label">Contraseña</label>
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-12">
            <label for="direccion" class="form-label">Dirección de envío</label>
            <input
              id="direccion"
              name="direccion"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              placeholder="Av. Ejemplo 123"
            />
          </div>
          <div class="col-md-6">
            <label for="ciudad" class="form-label">Ciudad</label>
            <input
              id="ciudad"
              name="ciudad"
              type="text"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-md-3">
            <label for="codigoPostal" class="form-label">Código postal</label>
            <input
              id="codigoPostal"
              name="codigoPostal"
              type="text"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-md-3">
            <label for="provincia" class="form-label">Provincia / Estado</label>
            <input
              id="provincia"
              name="provincia"
              type="text"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-md-6">
            <label for="telefono" class="form-label">Teléfono</label>
            <input
              id="telefono"
              name="telefono"
              type="tel"
              class="form-control bg-dark text-light border-secondary"
            />
          </div>
          <div class="col-12">
            <button id="btn-login" type="submit" class="btn btn-primary">
              Ingresar
            </button>
          </div>
        </form>
      </section>

      <section id="catalogo" aria-label="Catálogo" class="mb-5">
        <h2 class="h5 mb-3">Catálogo</h2>
        <div class="row">
          <aside id="filtros" class="col-md-3 mb-3">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Filtros</h3>
                <form id="form-filtros">
                  <div class="mb-3">
                    <label for="filtro-categoria" class="form-label"
                      >Categoría</label
                    >
                    <select
                      id="filtro-categoria"
                      class="form-select bg-dark text-light border-secondary"
                    ></select>
                  </div>
                  <div class="mb-3">
                    <label for="filtro-buscar" class="form-label">Buscar</label>
                    <input
                      id="filtro-buscar"
                      type="search"
                      class="form-control bg-dark text-light border-secondary"
                    />
                  </div>
                </form>
              </div>
            </div>
          </aside>

          <div id="lista-productos" class="col-md-9">
            <div class="row" id="productos-grid">
              <article class="producto col-md-4" id="producto-1">
                <div class="card mb-3 bg-dark text-light border-secondary">
                  <img
                    src="img/7155-AFmP9L._SY500_.jpg"
                    id="producto-1-imagen"
                    class="card-img-top"
                    alt="imagen producto"
                  />
                  <div class="card-body">
                    <h3 id="producto-1-nombre" class="card-title h6">
                      Nombre Producto
                    </h3>
                    <p id="producto-1-precio" class="card-text">Precio</p>
                    <button
                      id="producto-1-agregar"
                      class="btn btn-sm btn-outline-light"
                    >
                      Agregar al carrito
                    </button>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </div>
      </section>

      <section id="carrito" aria-label="Carrito de compras" class="mb-5">
        <h2 class="h5 mb-3">Carrito</h2>
        <div class="card bg-dark text-light border-secondary">
          <div class="card-body">
            <ul id="lista-carrito" class="list-group list-group-flush"></ul>
            <div id="carrito-total" class="mt-3 fw-semibold">Total: $0</div>
            <div class="mt-3">
              <button id="carrito-confirmar" class="btn btn-outline-light">
                Confirmar compra
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="historial" aria-label="Historial de compras" class="mb-5">
        <h2 class="h5 mb-3">Historial</h2>
        <div class="table-responsive">
          <table class="table table-dark" id="tabla-historial">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Productos</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="lista-historial"></tbody>
          </table>
        </div>
      </section>

      <section id="admin" aria-label="Panel de administrador" class="mb-5">
        <h2 class="h5 mb-3">Administración</h2>
        <div class="row">
          <div id="admin-usuarios" class="col-md-6">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Usuarios</h3>
                <div id="lista-usuarios" class="table-responsive">
                  <table class="table table-dark" id="tabla-usuarios"></table>
                </div>
              </div>
            </div>
          </div>
          <div id="admin-productos" class="col-md-6">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Productos</h3>
                <div id="lista-productos-admin" class="table-responsive">
                  <table
                    class="table table-dark"
                    id="tabla-productos-admin"
                  ></table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer id="footer" class="text-center py-3 text-muted">
      <p class="mb-0">Pie de página</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
