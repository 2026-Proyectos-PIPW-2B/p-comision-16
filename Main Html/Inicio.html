  <head>
    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header id="header" class="bg-dark border-bottom border-secondary">
      <nav id="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="Inicio.html">
            <h1 id="titulo" class="h5 mb-0">Tienda General</h1>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="menu" class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-light" href="Catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="Carrito.html">Carrito</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="Historial.html"
                  >Historial</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="Administracion.html"
                  >Administración</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-light"
                  href="Usuario.html"
                  title="Mi Perfil"

        </div>
      </nav>
    </header>

    <main id="main" class="container mt-4">
      <section id="login" aria-label="Inicio de sesión" class="mb-5">
        <h2 class="h5 mb-3">Inicio de sesión / Registro</h2>
        <form id="form-login" class="row g-3 needs-validation" novalidate>
          <div class="col-md-6">
            <label for="usuario" class="form-label">Usuario</label>
            <input
              id="usuario"
              name="usuario"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-6">
            <label for="contrasena" class="form-label">Contraseña</label>
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-12">
            <label for="direccion" class="form-label">Dirección de envío</label>
            <input
              id="direccion"
              name="direccion"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              placeholder="Av. Ejemplo 123"
              required
            />
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-6">
            <label for="ciudad" class="form-label">Ciudad</label>
            <input
              id="ciudad"
              name="ciudad"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-3">
            <label for="codigoPostal" class="form-label">Código postal</label>
            <input
              id="codigoPostal"
              name="codigoPostal"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback">Ingrese un código postal válido.</div>
          </div>
          <div class="col-md-3">
            <label for="provincia" class="form-label">Provincia / Estado</label>
            <input
              id="provincia"
              name="provincia"
              type="text"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-6">
            <label for="telefono" class="form-label">Teléfono</label>
            <input
              id="telefono"
              name="telefono"
              type="tel"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="invalid-feedback">
              Ingrese un número de teléfono válido.
            </div>
          </div>
          <div class="col-12">
            <button id="btn-login" type="submit" class="btn btn-primary">
              Ingresar
            </button>
          </div>
        </form>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script src="js/registro.js"></script>
  </body>
</html>
