<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header
      id="header"
      class="bg-dark py-3 mb-4 border-bottom border-secondary"
    >
      <div class="container d-flex justify-content-between align-items-center">
        <h1 id="titulo" class="h4 mb-0">Tienda General</h1>
        <nav id="nav" class="navbar">
          <ul id="menu" class="nav nav-pills">
            <li class="nav-item">
              <a class="nav-link text-light" href="Catalogo.html">Catálogo</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="Carrito.html">Carrito</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="Historial.html">Historial</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="Administracion.html"
                >Administración</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main id="main" class="container mt-4">
      <section id="catalogo" aria-label="Catálogo" class="mb-5">
        <h2 class="h5 mb-3">Catálogo</h2>
        <div class="row">
          <aside id="filtros" class="col-md-3 mb-3">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Filtros</h3>
                <form id="form-filtros">
                  <div class="mb-3">
                    <label for="filtro-categoria" class="form-label"
                      >Categoría</label
                    >
                    <select
                      id="filtro-categoria"
                      class="form-select bg-dark text-light border-secondary"
                    ></select>
                  </div>
                  <div class="mb-3">
                    <label for="filtro-buscar" class="form-label">Buscar</label>
                    <input
                      id="filtro-buscar"
                      type="search"
                      class="form-control bg-dark text-light border-secondary"
                    />
                  </div>
                </form>
              </div>
            </div>
          </aside>

          <div id="lista-productos" class="col-md-9">
            <div class="row" id="productos-grid">
              <article class="producto col-md-4" id="producto-1">
                <div class="card mb-3 bg-dark text-light border-secondary">
                  <img
                    src="img/7155-AFmP9L._SY500_.jpg"
                    id="producto-1-imagen"
                    class="card-img-top"
                    alt="imagen producto"
                  />
                  <div class="card-body">
                    <h3 id="producto-1-nombre" class="card-title h6">
                      Nombre Producto
                    </h3>
                    <p id="producto-1-precio" class="card-text">Precio</p>
                    <button
                      id="producto-1-agregar"
                      class="btn btn-sm btn-outline-light"
                    >
                      Agregar al carrito
                    </button>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer id="footer" class="text-center py-3 text-muted">
      <p class="mb-0">Pie de página</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
