<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/css.css" />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header id="header" class="border-bottom border-secondary">
      <nav id="nav" class="navbar navbar-expand-lg navbar-dark navbar-purple">
        <div class="container-fluid">
          <a class="navbar-brand">
            <h1 id="titulo" class="h5 mb-0">Tienda General</h1>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="menu" class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-light" href="catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="carrito.html">Carrito</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="historial.html"
                  >Historial</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="administracion.html"
                  >Administración</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-light"
                  href="Usuario.html"
                  title="Mi Perfil"
                >
                  <i class="bi bi-person-circle"></i>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main id="main" class="container mt-4">
      <section id="catalogo" aria-label="Catálogo" class="mb-5">
        <h2 class="h5 mb-3">Catálogo</h2>
        <div class="row g-4">
          <div class="col-12">
            <div
              class="card bg-primary bg-subtle text-light border-secondary mb-4"
            >
              <div class="card-body">
                <h3 class="h6">Filtros</h3>
                <form id="form-filtros" class="row g-3">
                  <div class="col-md-6">
                    <label for="filtro-categoria" class="form-label"
                      >Categoría</label
                    >
                    <select
                      id="filtro-categoria"
                      class="form-select border-secondary bg-secondary text-light"
                    >
                    <option value="default">Todas</option>
                  </select>
                  </div>
                  <div class="col-md-6">
                    <label for="filtro-buscar" class="form-label">Buscar</label>
                    <input
                      id="filtro-buscar"
                      type="search"
                      class="form-control border-secondary bg-secondary text-light"
                    />
                  </div>
                  <div class="col-6">
                    <button
                      type="button"
                      class="btn btn-outline-light w-100"
                      id="btn-ordenar-nombre"
                    >
                      Ordenar por nombre
                    </button>
                  </div>

                  <div class="col-6">
                    <button
                      type="button"
                      class="btn btn-outline-light w-100"
                      id="btn-ordenar-precio"
                    >
                      Ordenar por precio
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <div id="lista-productos" class="col-12">
            <div
              class="row g-4 justify-content-center"
              id="productos-grid"
            ></div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/redireccion.js"></script>
    <script type="module" src="js/catalogo.js"></script>

    <!-- modal -->
    <div
      class="modal fade"
      id="modalProductoAgregado"
      tabindex="-1"
      aria-labelledby="modalProductoAgregadoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalProductoAgregadoLabel">
              Producto Agregado al Carrito
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="card bg-secondary text-light border-secondary">
              <div class="card-body overflow-auto" id="listaCatalogo"></div>
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-outline-light"
              data-bs-dismiss="modal"
            >
              Seguir comprando
            </button>
            <a
              href="Carrito.html"
              type="button"
              class="btn btn-light text-dark"
            >
              Ir a mi carrito
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
