<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/css.css" />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header id="header" class="border-bottom border-secondary">
      <nav id="nav" class="navbar navbar-expand-lg navbar-dark navbar-purple">
        <div class="container-fluid">
          <a class="navbar-brand" href="inicio.html">
            <h1 id="titulo" class="h5 mb-0">Tienda General</h1>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="menu" class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-light" href="catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="carrito.html">Carrito</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="historial.html"
                  >Historial</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="administracion.html"
                  >Administración</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main id="main" class="container mt-4">
      <section id="login" aria-label="Inicio de sesión" class="mb-5">
        <h2 class="h5 mb-3">Inicio de sesión</h2>
        <form id="form-login" class="g-3">
          <div class="mb-2">
            <label for="usuario" class="form-label">Usuario</label>
            <input
              id="usuario"
              name="usuario"
              type="text"
              class="form-control bg-dark text-light border-secondary has-validation"
            />
            <div id="validationServerUsernameFeedback" class="invalid-feedback">
              El nombre de usuario ingresado no existe.
            </div>
          </div>
          <div class="mb-2">
            <label for="contrasena" class="form-label">Contraseña</label>
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              class="form-control bg-dark text-light border-secondary has-validation"
            />
            <div id="validationServerUsernameFeedback" class="invalid-feedback">
              Contraseña incorrecta.
            </div>
          <div>
            <button id="btn-login" type="submit" class="btn btn-primary mt-3">
              Ingresar
            </button>
            <button id="defaultValues" class="btn btn-secondary mt-3">
              Agregar perfiles y productos por defecto en localStorage
            </button>
          </div>
        </form>
      </section>
    </main>
    <footer id="footer" class="text-center py-3 text-muted">
      <p class="mb-0">Pie de página</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
