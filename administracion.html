<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administracion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/css.css" />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header id="header" class="border-bottom border-secondary">
      <nav id="nav" class="navbar navbar-expand-lg navbar-dark navbar-purple">
        <div class="container-fluid">
          <a class="navbar-brand">
            <h1 id="titulo" class="h5 mb-0">Tienda General</h1>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="menu" class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-light" href="catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="carrito.html">Carrito</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="historial.html"
                  >Historial</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="administracion.html"
                  >Administración</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-light"
                  href="usuario.html"
                  title="Mi Perfil"
                >
                  <i class="bi bi-person-circle"></i>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main id="main" class="container mt-4">
      <section id="admin" aria-label="Panel de administrador" class="mb-5">
        <h2 class="h5 mb-3">Administración</h2>
        <div class="mb-2">
          <label for="timer">Duración de sesión</label>
          <input type="number" name="timer" id="timer" />
          <label for="timer">minutos.</label>
        </div>
        <select name="" id="adminSelect" class="bg-dark text-light mb-3">
          <option value="usuarios">Usuarios</option>
          <option value="productos">Productos</option>
        </select>
        <div class="row">
          <div id="admin-usuarios" class="col-md-6">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Usuarios</h3>
                <div id="lista-usuarios" class="table-responsive">
                  <table
                    class="table table-dark table-striped"
                    id="tabla-usuarios"
                  >
                    <thead>
                      <tr>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Ciudad</th>
                        <th>Provincia</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="usuarios-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div id="admin-productos" class="col-md-8 visually-hidden">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Productos</h3>
                <div id="lista-productos-admin" class="table-responsive">
                  <table
                    class="table table-dark table-striped table-sm"
                    id="tabla-productos-admin"
                  >
                    <thead>
                      <tr>
                        <th>Imagen</th>
                        <th>Producto</th>
                        <th>Etiqueta</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                  </table>
                  <button
                    class="btn btn-primary"
                    id="agregar-producto"
                    data-bs-toggle="modal"
                    data-bs-target="#modalAgregarProducto"
                  >
                    Agregar Producto
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- modal (agregar producto) -->
    <div
      class="modal fade"
      id="modalAgregarProducto"
      tabindex="-1"
      aria-labelledby="modalAgregarProductoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light p-4">
          <div class="modal-header">
            <h5 class="modal-title" id="modalAgregarProductoLabel">
              Agregar Producto
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <!-- Formulario para agregar producto -->
            <form>
              <div class="row">
                <label for="nombreProducto" class="form-label mt-1">Nombre: </label>
                <input type="text" id="nombreProducto" class="form-control" />
                <label for="imagenUrl" class="form-label mt-1">Imagen Url: </label>
                <input type="text" id="imagenUrl" class="form-control" />
                <label for="precio" class="form-label mt-1">Precio: </label>
                <input type="number" id="precio" class="form-control" />
                <label for="stockDefecto" class="form-label mt-1"
                  >Stock Por Defecto:
                </label>
                <input type="number" id="stockDefecto" class="form-control" />
                <label for="etiqueta" class="form-label mt-1">Etiqueta: </label>
                <input type="text" id="etiqueta" class="form-control" />
                <button
                  type="submit"
                  id="agregarProducto"
                  class="btn btn-primary mt-4"
                >
                  Agregar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/redireccion.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/adminUsuarios.js"></script>
  </body>
</html>
