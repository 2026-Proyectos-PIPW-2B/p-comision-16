<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administracion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/css.css" />
  </head>
  <body id="pagina" class="bg-dark text-light">
    <header id="header" class="border-bottom border-secondary">
      <nav id="nav" class="navbar navbar-expand-lg navbar-dark navbar-purple">
        <div class="container-fluid">
          <a class="navbar-brand">
            <h1 id="titulo" class="h5 mb-0">Tienda General</h1>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="menu" class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-light" href="catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="carrito.html">Carrito</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="historial.html"
                  >Historial</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="administracion.html"
                  >Administración</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-light"
                  href="Usuario.html"
                  title="Mi Perfil"
                >
                  <i class="bi bi-person-circle"></i>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main id="main" class="container mt-4">
      <section id="admin" aria-label="Panel de administrador" class="mb-5">
        <h2 class="h5 mb-3">Administración</h2>
        <div class="mb-2">
          <label for="timer">Duración de sesión</label>
          <input type="number" name="timer" id="timer" />
          <label for="timer">minutos.</label>
        </div>
        <select name="" id="adminSelect" class="bg-dark text-light mb-3">
          <option value="usuarios">Usuarios</option>
          <option value="productos">Productos</option>
        </select>
        <div class="row">
          <div id="admin-usuarios" class="col-md-6">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Usuarios</h3>
                <div id="lista-usuarios" class="table-responsive">
                  <table
                    class="table table-dark table-striped"
                    id="tabla-usuarios"
                  >
                    <thead>
                      <tr>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Ciudad</th>
                        <th>Provincia</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="usuarios-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div id="admin-productos" class="col-md-6 visually-hidden">
            <div class="card bg-dark text-light border-secondary">
              <div class="card-body">
                <h3 class="h6">Productos</h3>
                <div id="lista-productos-admin" class="table-responsive">
                  <table
                    class="table table-dark table-striped table-sm"
                    id="tabla-productos-admin"
                  >
                    <thead>
                      <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>
                          <img
                            src="img/7155-AFmP9L._SY500_.jpg"
                            alt="Producto ejemplo"
                            class="img-fluid me-2"
                            width="50"
                          />Producto de Ejemplo
                        </td>
                        <td>$499.99</td>
                        <td>
                          <button class="btn btn-sm btn-outline-light">
                            Agregar al catálogo
                          </button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <div
        class="modal fade"
        id="modalProductos"
        tabindex="-1"
        aria-labelledby="modalProductos"
        style="display: none"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-fullscreen-sm-down modal-lg">
          <div class="modal-content bg-secondary">
            <div class="modal-header">
              <h1 class="modal-title fs-4 text-light" id="modalProductos">
                Productos del usuario
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <table class="table table-dark table-striped">
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th>Cantidad comprada</th>
                    <th>Precio total</th>
                  </tr>
                </thead>
                <tbody id="listaProductos"></tbody>
              </table>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cerrar
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/redireccion.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/adminUsuarios.js"></script>
  </body>
</html>
